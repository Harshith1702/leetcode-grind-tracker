<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Space+Mono&display=swap" rel="stylesheet">
  <title>Harshith's LeetCode Stats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>⚡ LeetCode Tracker</h1>
  <p class="sub">Harshith's(Meeh!!) daily grind — live stats</p>
  <div id="tabs">
    <button class="tab active" data-view="difficulty_stats">Difficulty Stats</button>
    <button class="tab" data-view="my_performance">My Performance</button>
    <button class="tab" data-view="weak_topics">Weak Topics</button>
    <button class="tab" data-view="streak_history">Streak History</button>
  </div>
  <div id="content"></div>
  <p id="error" style="display:none; color:red;">Couldn't load data. Try again.</p>
  <script src="app.js"></script>
</body>
</html>
